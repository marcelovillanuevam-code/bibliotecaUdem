services:
  postgres:
    image: postgres:17-alpine
    container_name: biblioteca-udem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca_udem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biblioteca_udem"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
