name: bibliotecaudem

services:
  postgres:
    image: postgres:17-alpine
    container_name: biblioteca-udem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca_udem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biblioteca_udem"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Biblioteca.API/Dockerfile
    container_name: bibliotecaudem-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=biblioteca_udem;Username=postgres;Password=postgres
      Jwt__Issuer: BibliotecaUdem
      Jwt__Audience: BibliotecaUdem.Client
      Jwt__SecretKey: CHANGE_ME_WITH_A_LONG_DEVELOPMENT_SECRET
      Jwt__ExpiresInMinutes: 60
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5122:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/biblioteca-app/Dockerfile
    container_name: bibliotecaudem-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
