<header class="topbar">
  <div class="topbar__left">
    <button class="topbar__menu" type="button" (click)="menuToggle.emit()" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none">
        <path
          d="M4 7H20M4 12H20M4 17H14"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <div>
      <p class="topbar__eyebrow">Sistema de Biblioteca</p>
      <h1>{{ title() }}</h1>
    </div>
  </div>

  <div class="topbar__right">
    <app-notification-bell />

    <div class="topbar__user">
      <span class="topbar__avatar">{{ user().initials }}</span>
      <span class="topbar__meta">
        <strong>{{ user().name }}</strong>
        <small>{{ user().role }}</small>
      </span>
    </div>

    <button class="topbar__logout" type="button" (click)="logoutRequest.emit()" title="Cerrar sesión" aria-label="Cerrar sesión">
      <svg viewBox="0 0 24 24" fill="none">
        <path
          d="M15 16L19 12M19 12L15 8M19 12H9M11 20H6C4.89543 20 4 19.1046 4 18V6C4 4.89543 4.89543 4 6 4H11"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
  </div>
</header>
